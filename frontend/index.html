<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAA — Lecture Access Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/cwasa.css" />
</head>
<body onload="CWASA.init();">
  <div class="app">
    <header class="header">
      <h1>LAA <span class="tag">Lecture Access Agent</span></h1>
      <div class="controls">
        <select id="micSelect" class="mic-select"></select>
        <div class="lang-switcher">
          <button class="lang-btn active" data-mode="auto">Авто</button>
          <button class="lang-btn" data-mode="ru">RU</button>
          <button class="lang-btn" data-mode="en">EN</button>
          <button class="lang-btn" data-mode="kz">KZ</button>
        </div>
        <button id="btnStart" class="btn btn-start">Начать</button>
        <button id="btnStop" class="btn btn-stop" disabled>Остановить</button>
        <span id="statusDot" class="dot dot-idle"></span>
        <span id="statusMsg" class="status-msg"></span>
      </div>
    </header>

    <main class="main">
      <section class="panel panel-avatar">
        <!-- CWASA avatar container — rendered by allcsa.js -->
        <div class="CWASAAvatar av0" id="cwasaPanel"></div>
        <p id="avatarLabel" class="avatar-label"></p>
      </section>

      <section class="panel panel-subtitles">
        <h2>Субтитры</h2>
        <div id="subtitleBox" class="subtitle-box"></div>
        <div id="keywords" class="keywords"></div>
      </section>
    </main>

    <footer class="panel panel-summary hidden" id="summaryPanel">
      <h2>Резюме сессии</h2>
      <p id="summaryText"></p>
    </footer>
  </div>

  <script src="/static/allcsa.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
